<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SDLC Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0015;display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;}
#c{display:block;max-width:100vw;max-height:100vh;cursor:none;}
#ui{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;
  padding:10px 20px;pointer-events:none;z-index:10;}
/* Mobile controls */
#controls{position:fixed;bottom:10px;left:0;right:0;display:flex;
  justify-content:space-between;padding:0 12px;pointer-events:none;z-index:20;}
.ctrl-group{display:flex;gap:8px;}
.ctrl-btn{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.12);
  border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;
  font-size:22px;pointer-events:all;cursor:pointer;user-select:none;-webkit-user-select:none;
  active:background:rgba(255,255,255,.25);}
.ctrl-btn:active{background:rgba(255,255,255,.3);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <div class="ctrl-group">
    <div class="ctrl-btn" id="btnL">◀</div>
    <div class="ctrl-btn" id="btnR">▶</div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-btn" id="btnJ">⬆</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const BASE_W = 800, BASE_H = 480;
canvas.width = BASE_W; canvas.height = BASE_H;

// Scale canvas to fit screen
function scaleCanvas(){
  const sx = window.innerWidth / BASE_W;
  const sy = window.innerHeight / BASE_H;
  const s = Math.min(sx, sy);
  canvas.style.width = (BASE_W * s) + 'px';
  canvas.style.height = (BASE_H * s) + 'px';
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

// Detect mobile
const isMobile = /Android|iPhone|iPad|Touch/i.test(navigator.userAgent) || window.innerWidth < 600;
document.getElementById('controls').style.display = isMobile ? 'flex' : 'none';

// ════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════
let audioCtx;
function getAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function beep(freq, type='square', dur=0.08, vol=0.12){
  try{
    const a = getAudio();
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  }catch(e){}
}
function sfxJump(){ beep(220,'sine',0.12,0.1); }
function sfxCollect(){ beep(660,'sine',0.05); setTimeout(()=>beep(880,'sine',0.08),60); }
function sfxHurt(){ beep(110,'sawtooth',0.2,0.15); }
function sfxWrong(){ beep(200,'square',0.1,0.08); }
function sfxWin(){ [440,550,660,880].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.15,0.12),i*100)); }

// ════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════
const GRAVITY = 0.52;
const JUMP_F  = -12.5;
const SPEED   = 3.8;
const WORLD_W = 3500;
const GY      = 400; // ground top y
const GROUND_H = 80;

// ════════════════════════════════════════════
//  PHASES
// ════════════════════════════════════════════
const PHASES = [
  { name:'Planificación', icon:'📋', color:'#38bdf8' },
  { name:'Análisis',      icon:'🔍', color:'#a78bfa' },
  { name:'Diseño',        icon:'🎨', color:'#fb923c' },
  { name:'Implementación',icon:'💻', color:'#4ade80' },
  { name:'Pruebas',       icon:'🧪', color:'#f472b6' },
  { name:'Despliegue',    icon:'🚀', color:'#fbbf24' },
  { name:'Mantenimiento', icon:'🔧', color:'#34d399' },
];

// ════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════
const S = { MENU:0, PLAY:1, WIN:2, DEAD:3, OVER:4 };
let gs = S.MENU;
let score = 0, lives = 3, nextPhase = 0;
let particles = [], floatTexts = [];
let cam = { x: 0 };
let ticks = 0;

// ════════════════════════════════════════════
//  PLAYER
// ════════════════════════════════════════════
const P = {
  x:80, y:350, w:26, h:34,
  vx:0, vy:0,
  onGround:false, facing:1,
  inv:0, // invincibility frames
  dead:false,
  reset(){ this.x=80;this.y=350;this.vx=0;this.vy=0;this.onGround=false;this.inv=0;this.dead=false; }
};

// ════════════════════════════════════════════
//  LEVEL DATA
// ════════════════════════════════════════════
// Platforms: {x,y,w,h, mx,mrange (moving), color}
const PLATS = [
  // Ground sections (with gaps)
  {x:-100, y:GY, w:620, h:GROUND_H, color:'#1e3a2f'},
  {x:620,  y:GY, w:350, h:GROUND_H, color:'#1e3a2f'},
  {x:1020, y:GY, w:400, h:GROUND_H, color:'#1e3a2f'},
  {x:1500, y:GY, w:500, h:GROUND_H, color:'#1e3a2f'},
  {x:2100, y:GY, w:300, h:GROUND_H, color:'#1e3a2f'},
  {x:2500, y:GY, w:450, h:GROUND_H, color:'#1e3a2f'},
  {x:3050, y:GY, w:600, h:GROUND_H, color:'#1e3a2f'},

  // Stepping platforms
  {x:200,  y:310, w:130, h:18, color:'#2d5a3d'},  // 0 - leads to phase 1
  {x:400,  y:255, w:140, h:18, color:'#2d5a3d'},  // 1 - phase 1 HERE
  {x:700,  y:320, w:110, h:18, color:'#2d5a3d'},  // 2
  {x:840,  y:265, w:130, h:18, color:'#2d5a3d'},  // 3 - phase 2 HERE
  {x:1040, y:340, w:110, h:18, color:'#2d5a3d'},  // 4
  {x:1160, y:280, w:100, h:18, color:'#2d5a3d'},  // 5
  {x:1290, y:225, w:150, h:18, color:'#2d5a3d'},  // 6 - phase 3 HERE
  {x:1510, y:310, w:120, h:18, color:'#2d5a3d'},  // 7
  {x:1670, y:255, w:120, h:18, color:'#2d5a3d'},  // 8 - phase 4 HERE
  {x:1840, y:320, w:110, h:18, color:'#2d5a3d', mx:1, mrange:80},  // 9 moving
  {x:2000, y:260, w:130, h:18, color:'#2d5a3d'},  // 10 - phase 5 HERE
  {x:2130, y:340, w:100, h:18, color:'#2d5a3d'},  // 11
  {x:2280, y:275, w:130, h:18, color:'#2d5a3d'},  // 12
  {x:2450, y:215, w:160, h:18, color:'#2d5a3d'},  // 13 - phase 6 HERE
  {x:2650, y:330, w:110, h:18, color:'#2d5a3d'},  // 14
  {x:2800, y:270, w:110, h:18, color:'#2d5a3d'},  // 15
  {x:2950, y:210, w:110, h:18, color:'#2d5a3d'},  // 16
  {x:3100, y:155, w:180, h:18, color:'#2d5a3d'},  // 17 - phase 7 HERE (final)
  {x:3350, y:GY,  w:180, h:GROUND_H, color:'#2d4a1e'}, // finish
];

// Phase orbs: {x,y,phaseIdx,collected,bob}
const ORBS = [
  {x:455, y:220, pi:0, collected:false, bob:0},
  {x:885, y:228, pi:1, collected:false, bob:1},
  {x:1345,y:188, pi:2, collected:false, bob:2},
  {x:1710,y:218, pi:3, collected:false, bob:0.5},
  {x:2045,y:223, pi:4, collected:false, bob:1.5},
  {x:2510,y:178, pi:5, collected:false, bob:0.8},
  {x:3160,y:118, pi:6, collected:false, bob:1.2},
];

// Enemies (bugs): {x,y,w,h,vx,x1,x2,alive}
const ENEMIES_TEMPLATE = [
  {x:850,  y:GY-24, w:24,h:24, vx:1.2, x1:640, x2:950,  alive:true},
  {x:1050, y:GY-24, w:24,h:24, vx:-1,  x1:1020,x2:1380, alive:true},
  {x:1680, y:235,   w:22,h:22, vx:1,   x1:1670,x2:1770, alive:true},
  {x:2290, y:255,   w:22,h:22, vx:-1.2,x1:2280,x2:2390, alive:true},
  {x:2810, y:250,   w:22,h:22, vx:1,   x1:2800,x2:2890, alive:true},
];
let enemies = [];

// ════════════════════════════════════════════
//  MOVING PLATFORMS STATE
// ════════════════════════════════════════════
let platState = [];

function initGame(){
  score = 0; lives = 3; nextPhase = 0; ticks = 0;
  P.reset();
  cam.x = 0;
  particles = []; floatTexts = [];
  ORBS.forEach(o=>o.collected=false);
  enemies = ENEMIES_TEMPLATE.map(e=>({...e}));
  // init moving plat offsets
  platState = PLATS.map(p=>({ ox: p.x, dir: 1 }));
  gs = S.PLAY;
}

// ════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.key]=true; if(['ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault(); });
window.addEventListener('keyup',   e=>{ keys[e.key]=false; });

// Mobile buttons
const mb = { L:false, R:false, J:false };
function bindBtn(id, prop){
  const btn = document.getElementById(id);
  ['touchstart','mousedown'].forEach(ev=>btn.addEventListener(ev,e=>{e.preventDefault();mb[prop]=true;},{ passive:false }));
  ['touchend','mouseup','touchcancel'].forEach(ev=>btn.addEventListener(ev,e=>{e.preventDefault();mb[prop]=false;},{ passive:false }));
}
bindBtn('btnL','L'); bindBtn('btnR','R'); bindBtn('btnJ','J');

function inp(k){ return keys[k]; }
function left(){  return inp('ArrowLeft') || inp('a') || mb.L; }
function right(){ return inp('ArrowRight')|| inp('d') || mb.R; }
function jump(){  return inp('ArrowUp') || inp('w') || inp(' ') || mb.J; }

let jumpHeld = false;

// ════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════
function spawnParticles(x,y,color,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,
      life:1,color,r:3+Math.random()*4});
  }
}
function floatText(x,y,text,color){
  floatTexts.push({x,y,vy:-1.5,text,color,life:1.5});
}

// ════════════════════════════════════════════
//  AABB COLLISION
// ════════════════════════════════════════════
function overlaps(ax,ay,aw,ah, bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

// ════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════
function update(){
  if(gs !== S.PLAY) return;
  ticks++;

  // Move platforms
  PLATS.forEach((p,i)=>{
    if(p.mx){
      platState[i].ox += p.mx * platState[i].dir;
      if(platState[i].ox > p.x + p.mrange) platState[i].dir = -1;
      if(platState[i].ox < p.x - p.mrange) platState[i].dir = 1;
      p.x = platState[i].ox;
    }
  });

  // Player input
  const onL = left(), onR = right(), onJ = jump();

  P.vx = 0;
  if(onL){ P.vx = -SPEED; P.facing = -1; }
  if(onR){ P.vx =  SPEED; P.facing =  1; }

  // Jump
  if(onJ && !jumpHeld && P.onGround){ P.vy = JUMP_F; jumpHeld=true; sfxJump(); }
  if(!onJ) jumpHeld = false;

  // Gravity
  P.vy += GRAVITY;
  P.vy = Math.min(P.vy, 18);

  // Move X
  P.x += P.vx;
  P.x = Math.max(0, P.x);

  // Move Y
  P.y += P.vy;
  P.onGround = false;

  // Platform collisions
  PLATS.forEach(p=>{
    if(overlaps(P.x, P.y, P.w, P.h, p.x, p.y, p.w, p.h)){
      // Coming from above - land on top
      if(P.vy >= 0 && (P.y + P.h - P.vy) <= p.y + 4){
        P.y = p.y - P.h;
        P.vy = 0;
        P.onGround = true;
        // Carry with moving platform
        if(p.mx) P.x += p.mx * (platState[PLATS.indexOf(p)]?.dir || 1);
      }
      // Coming from below - head bump
      else if(P.vy < 0 && (P.y - P.vy) >= p.y + p.h - 4){
        P.y = p.y + p.h;
        P.vy = 2;
      }
      // Side collisions
      else if(P.vx > 0){ P.x = p.x - P.w; P.vx=0; }
      else if(P.vx < 0){ P.x = p.x + p.w; P.vx=0; }
    }
  });

  // Fell into pit
  if(P.y > BASE_H + 60 && P.inv === 0){
    sfxHurt();
    hurtPlayer();
  }

  // Right world boundary
  P.x = Math.min(P.x, WORLD_W - P.w);

  // Invincibility countdown
  if(P.inv > 0) P.inv--;

  // Camera
  cam.x = P.x - BASE_W/2 + P.w/2;
  cam.x = Math.max(0, Math.min(cam.x, WORLD_W - BASE_W));

  // ── Orb collection ──
  ORBS.forEach(orb=>{
    if(orb.collected) return;
    const ox = orb.x - 14, oy = orb.y - 14 + Math.sin((ticks*0.05)+orb.bob)*6;
    if(overlaps(P.x,P.y,P.w,P.h, ox,oy,28,28)){
      if(orb.pi === nextPhase){
        // Correct!
        orb.collected = true;
        nextPhase++;
        score += 100;
        sfxCollect();
        spawnParticles(orb.x, orb.y, PHASES[orb.pi].color, 16);
        floatText(orb.x, orb.y-20, '+100  '+PHASES[orb.pi].icon, PHASES[orb.pi].color);
        if(nextPhase === PHASES.length){
          sfxWin();
          setTimeout(()=>gs=S.WIN, 600);
        }
      } else {
        // Wrong order!
        sfxWrong();
        P.vx = P.facing*-4; P.vy = -5;
        floatText(orb.x, orb.y-20, '¡Primero '+PHASES[nextPhase].icon+'!', '#f87171');
      }
    }
  });

  // ── Enemy movement & collision ──
  enemies.forEach(en=>{
    if(!en.alive) return;
    en.x += en.vx;
    if(en.x < en.x1){ en.x=en.x1; en.vx*=-1; }
    if(en.x + en.w > en.x2){ en.x=en.x2-en.w; en.vx*=-1; }

    if(P.inv === 0 && overlaps(P.x,P.y,P.w,P.h, en.x,en.y,en.w,en.h)){
      // Stomp from above
      if(P.vy > 0 && P.y + P.h < en.y + en.h/2 + 10){
        en.alive = false;
        P.vy = -8;
        score += 50;
        sfxCollect();
        spawnParticles(en.x+en.w/2, en.y, '#f87171', 10);
        floatText(en.x, en.y-10, '+50 BUG!', '#f87171');
      } else {
        sfxHurt();
        hurtPlayer();
      }
    }
  });

  // Particles
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.03; });
  particles = particles.filter(p=>p.life>0);

  floatTexts.forEach(f=>{ f.y+=f.vy; f.life-=0.025; });
  floatTexts = floatTexts.filter(f=>f.life>0);
}

function hurtPlayer(){
  P.inv = 90;
  P.vy = -8;
  P.vx = P.facing * -5;
  lives--;
  if(lives <= 0){ lives=0; gs=S.OVER; }
  else gs = S.DEAD;
  if(gs===S.DEAD){
    // Respawn after 1.5s
    setTimeout(()=>{
      P.x=80; P.y=350; P.vx=0; P.vy=0; P.inv=60; cam.x=0;
      gs=S.PLAY;
    }, 1500);
  }
}

// ════════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════════
function drawBG(){
  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,BASE_H);
  sky.addColorStop(0,'#0a0015');
  sky.addColorStop(0.7,'#0f0830');
  sky.addColorStop(1,'#1a0840');
  ctx.fillStyle=sky; ctx.fillRect(0,0,BASE_W,BASE_H);

  // Stars (parallax 0.2x)
  ctx.fillStyle='rgba(255,255,255,0.6)';
  for(let i=0;i<80;i++){
    const sx = ((i*137.5 + 50) % WORLD_W);
    const sy = (i*73) % (BASE_H*0.7);
    const px = ((sx - cam.x*0.2) % BASE_W + BASE_W) % BASE_W;
    const size = i%5===0 ? 2 : 1;
    ctx.fillRect(px, sy, size, size);
  }

  // Distant mountains (parallax 0.4x)
  ctx.fillStyle='rgba(50,20,80,0.6)';
  for(let i=0;i<8;i++){
    const mx = ((i*500 - cam.x*0.4) % (BASE_W+200) + BASE_W+200) % (BASE_W+200) - 100;
    const mh = 80+i%3*60;
    ctx.beginPath();
    ctx.moveTo(mx-80,BASE_H);
    ctx.lineTo(mx,BASE_H-mh);
    ctx.lineTo(mx+80,BASE_H);
    ctx.fill();
  }
}

function drawPlats(){
  PLATS.forEach(p=>{
    const px = p.x - cam.x;
    if(px+p.w < -20 || px > BASE_W+20) return;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(px+4, p.y+4, p.w, p.h);
    // Body
    ctx.fillStyle = p.color;
    ctx.fillRect(px, p.y, p.w, p.h);
    // Top highlight
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(px, p.y, p.w, 4);
    // Grass on top (ground platforms)
    if(p.h===GROUND_H){
      ctx.fillStyle='#4ade80';
      ctx.fillRect(px, p.y, p.w, 8);
      // Grass blades
      ctx.fillStyle='#22c55e';
      for(let gx=px+8; gx<px+p.w-8; gx+=16){
        ctx.fillRect(gx,   p.y-4, 3, 8);
        ctx.fillRect(gx+5, p.y-6, 3, 9);
      }
    }
  });
}

function drawOrbs(){
  ORBS.forEach(orb=>{
    if(orb.collected) return;
    const ox = orb.x - cam.x;
    const oy = orb.y + Math.sin((ticks*0.05)+orb.bob)*6;
    const ph = PHASES[orb.pi];

    // Glow
    const grd = ctx.createRadialGradient(ox,oy,2,ox,oy,22);
    grd.addColorStop(0, ph.color+'88');
    grd.addColorStop(1, ph.color+'00');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.arc(ox,oy,22,0,Math.PI*2); ctx.fill();

    // Orb body
    ctx.fillStyle = ph.color;
    ctx.beginPath(); ctx.arc(ox,oy,12,0,Math.PI*2); ctx.fill();

    // Phase number
    ctx.fillStyle='#000';
    ctx.font='bold 10px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(orb.pi+1, ox, oy);

    // Label below
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font='9px sans-serif';
    ctx.fillText(ph.icon, ox, oy+24);

    // Dim if not current
    if(orb.pi !== nextPhase){
      ctx.fillStyle='rgba(0,0,0,0.45)';
      ctx.beginPath(); ctx.arc(ox,oy,12,0,Math.PI*2); ctx.fill();
    } else {
      // Arrow pointing to it if close
      const dist = Math.abs(ox - BASE_W/2);
      if(dist < 200){
        ctx.fillStyle=ph.color;
        ctx.beginPath();
        ctx.moveTo(ox-6,oy-20); ctx.lineTo(ox+6,oy-20); ctx.lineTo(ox,oy-13);
        ctx.fill();
      }
    }
  });
}

function drawEnemies(){
  enemies.forEach(en=>{
    if(!en.alive) return;
    const ex = en.x - cam.x;
    // Bug body
    ctx.fillStyle='#ef4444';
    ctx.fillRect(ex,en.y,en.w,en.h);
    // Legs
    ctx.fillStyle='#b91c1c';
    for(let i=0;i<3;i++){
      ctx.fillRect(ex+i*8+2, en.y+en.h,   3, 6);
      ctx.fillRect(ex+i*8+2, en.y+en.h-4, 3, 4);
    }
    // Eyes
    ctx.fillStyle='#fff';
    ctx.fillRect(ex+4, en.y+5, 6,6);
    ctx.fillRect(ex+14,en.y+5, 6,6);
    ctx.fillStyle='#000';
    ctx.fillRect(ex+6, en.y+7, 3,3);
    ctx.fillRect(ex+16,en.y+7, 3,3);
    // Angry brow
    ctx.fillStyle='#7f1d1d';
    ctx.fillRect(ex+3, en.y+3, 8,2);
    ctx.fillRect(ex+13,en.y+3, 8,2);
  });
}

function drawPlayer(){
  const px = P.x - cam.x;
  const py = P.y;
  const f = P.facing;
  const alpha = P.inv > 0 ? (Math.floor(P.inv/6)%2===0 ? 0.4 : 1) : 1;
  ctx.globalAlpha = alpha;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(px+2, GY-2, P.w, 6);

  // Body (hoodie)
  ctx.fillStyle='#7c3aed';
  ctx.fillRect(px+3, py+14, P.w-6, P.h-14);

  // Head
  ctx.fillStyle='#fed7aa';
  ctx.fillRect(px+5, py, P.w-10, 16);

  // Hair
  ctx.fillStyle='#1c1917';
  ctx.fillRect(px+5, py, P.w-10, 6);
  ctx.fillRect(f===1 ? px+5 : px+P.w-9, py, 4, 10);

  // Eyes
  ctx.fillStyle='#fff';
  const eyeX = f===1 ? px+P.w-10 : px+4;
  ctx.fillRect(eyeX, py+7, 5, 5);
  ctx.fillStyle='#1e3a5f';
  ctx.fillRect(eyeX+(f===1?2:1), py+8, 3,3);

  // Laptop bag
  ctx.fillStyle='#4c1d95';
  ctx.fillRect(f===1 ? px+P.w-8 : px+2, py+18, 8, 12);

  // Legs
  const legAnim = P.onGround ? Math.sin(ticks*0.2+P.x*0.1)*4 : 0;
  ctx.fillStyle='#312e81';
  ctx.fillRect(px+5, py+P.h-12, 8, 12);
  ctx.fillRect(px+P.w-13, py+P.h-12, 8, 12);
  // Feet
  ctx.fillStyle='#1e1b4b';
  ctx.fillRect(px+3, py+P.h-4, 10,4);
  ctx.fillRect(px+P.w-13,py+P.h-4, 10,4);

  ctx.globalAlpha = 1;
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x-cam.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawFloatTexts(){
  floatTexts.forEach(f=>{
    ctx.globalAlpha = Math.min(f.life, 1);
    ctx.fillStyle = f.color;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x-cam.x, f.y);
  });
  ctx.globalAlpha=1;
}

function drawHUD(){
  // Lives
  ctx.font='22px serif'; ctx.textAlign='left'; ctx.textBaseline='top';
  for(let i=0;i<3;i++) ctx.fillText(i<lives?'❤️':'🖤', 10+i*28, 8);

  // Score
  ctx.fillStyle='#fbbf24'; ctx.font='bold 16px monospace';
  ctx.textAlign='right';
  ctx.fillText('★ '+score, BASE_W-10, 10);

  // Phase progress bar
  const bx=10, by=44, bw=260, bh=14;
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
  ctx.strokeRect(bx,by,bw,bh);

  const step=bw/PHASES.length;
  PHASES.forEach((ph,i)=>{
    const done=i<nextPhase, current=i===nextPhase;
    const fx=bx+i*step;
    ctx.fillStyle = done ? ph.color : current ? ph.color+'66' : 'rgba(255,255,255,0.05)';
    ctx.fillRect(fx+1,by+1,step-2,bh-2);
    if(done){
      ctx.font='9px sans-serif'; ctx.textAlign='center'; ctx.fillStyle='#000';
      ctx.fillText(ph.icon, fx+step/2, by+bh/2+3);
    }
    if(current){
      ctx.fillStyle='#fff'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText(ph.icon, fx+step/2, by+bh/2+3);
    }
  });

  // "Next:" label
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='10px sans-serif'; ctx.textAlign='left';
  ctx.fillText('SIGUIENTE:', bx, by-10);
  if(nextPhase<PHASES.length){
    const ph=PHASES[nextPhase];
    ctx.fillStyle=ph.color; ctx.font='bold 10px sans-serif';
    ctx.fillText(ph.icon+' '+ph.name, bx+60, by-10);
  }

  // Directional arrow hint (if orb is off-screen)
  if(nextPhase < PHASES.length){
    const orb=ORBS[nextPhase];
    const ox=orb.x-cam.x;
    if(ox < -20){
      ctx.fillStyle='#fbbf24'; ctx.font='bold 18px sans-serif'; ctx.textAlign='left';
      ctx.fillText('◀ '+PHASES[orb.pi].icon, 12, BASE_H/2);
    } else if(ox > BASE_W+20){
      ctx.fillStyle='#fbbf24'; ctx.font='bold 18px sans-serif'; ctx.textAlign='right';
      ctx.fillText(PHASES[orb.pi].icon+' ▶', BASE_W-12, BASE_H/2);
    }
  }
}

// ════════════════════════════════════════════
//  SCREENS
// ════════════════════════════════════════════
function drawMenu(){
  ctx.fillStyle='#0a0015'; ctx.fillRect(0,0,BASE_W,BASE_H);
  drawBG();

  // Title card
  ctx.fillStyle='rgba(0,0,0,0.5)';
  roundRect(ctx, BASE_W/2-220, 60, 440, 280, 20);
  ctx.fill();
  ctx.strokeStyle='rgba(168,85,247,0.5)'; ctx.lineWidth=2;
  roundRect(ctx, BASE_W/2-220, 60, 440, 280, 20);
  ctx.stroke();

  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#a855f7'; ctx.font='bold 13px monospace';
  ctx.fillText('CICLO DE VIDA DEL SOFTWARE', BASE_W/2, 90);

  ctx.fillStyle='#ffffff'; ctx.font='bold 48px sans-serif';
  ctx.fillText('SDLC', BASE_W/2, 148);
  ctx.fillStyle='#38bdf8'; ctx.font='bold 28px sans-serif';
  ctx.fillText('RUNNER 🏃', BASE_W/2, 188);

  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='13px sans-serif';
  ctx.fillText('Recoge las 7 fases EN ORDEN correcto', BASE_W/2, 225);
  ctx.fillText('Esquiva los bugs  ❌  No caigas al vacío', BASE_W/2, 248);

  // Phase icons
  PHASES.forEach((ph,i)=>{
    const x = BASE_W/2 - 126 + i*42;
    ctx.fillStyle=ph.color; ctx.font='11px monospace';
    ctx.fillText(i+1, x, 278);
    ctx.font='16px sans-serif';
    ctx.fillText(ph.icon, x, 298);
  });

  // Blink start
  if(Math.floor(ticks/30)%2===0){
    ctx.fillStyle='#fbbf24'; ctx.font='bold 16px sans-serif';
    ctx.fillText('▶  PRESIONA ESPACIO / ENTER  ◀', BASE_W/2, BASE_H-80);
    if(isMobile){
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='12px sans-serif';
      ctx.fillText('o toca el botón ⬆ para comenzar', BASE_W/2, BASE_H-55);
    }
  }
}

function drawDead(){
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,BASE_W,BASE_H);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ef4444'; ctx.font='bold 32px sans-serif';
  ctx.fillText('💀 ¡TE GOLPEARON!', BASE_W/2, BASE_H/2-20);
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='16px sans-serif';
  ctx.fillText('Vidas restantes: '+'❤️'.repeat(lives), BASE_W/2, BASE_H/2+20);
}

function drawOver(){
  drawBG();
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,BASE_W,BASE_H);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ef4444'; ctx.font='bold 44px sans-serif';
  ctx.fillText('GAME OVER', BASE_W/2, BASE_H/2-60);
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='18px sans-serif';
  ctx.fillText('Recolectaste '+nextPhase+' de 7 fases', BASE_W/2, BASE_H/2-10);
  ctx.fillStyle='#fbbf24'; ctx.font='bold 20px sans-serif';
  ctx.fillText('Puntos: '+score, BASE_W/2, BASE_H/2+30);
  if(Math.floor(ticks/30)%2===0){
    ctx.fillStyle='#fff'; ctx.font='16px sans-serif';
    ctx.fillText('Presiona ESPACIO para reintentar', BASE_W/2, BASE_H/2+80);
  }
}

function drawWin(){
  drawBG();
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,BASE_W,BASE_H);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  // Confetti
  for(let i=0;i<40;i++){
    const px2=((i*137+(ticks*2))%BASE_W);
    const py2=((ticks*2+i*53)%BASE_H);
    ctx.fillStyle=PHASES[i%7].color;
    ctx.fillRect(px2,py2,5,5);
  }

  ctx.fillStyle='#fbbf24'; ctx.font='bold 48px sans-serif';
  ctx.fillText('🏆 ¡GANASTE! 🏆', BASE_W/2, BASE_H/2-80);

  ctx.fillStyle='#fff'; ctx.font='bold 16px sans-serif';
  ctx.fillText('¡Completaste el Ciclo de Vida del Software!', BASE_W/2, BASE_H/2-30);

  PHASES.forEach((ph,i)=>{
    ctx.fillStyle=ph.color;
    ctx.font='13px sans-serif';
    ctx.fillText((i+1)+'. '+ph.icon+' '+ph.name, BASE_W/2, BASE_H/2+10+i*22);
  });

  ctx.fillStyle='#fbbf24'; ctx.font='bold 22px sans-serif';
  ctx.fillText('Puntos: '+score, BASE_W/2, BASE_H-80);
  if(Math.floor(ticks/30)%2===0){
    ctx.fillStyle='#a855f7'; ctx.font='16px sans-serif';
    ctx.fillText('Presiona ESPACIO para jugar de nuevo', BASE_W/2, BASE_H-48);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// ════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,BASE_W,BASE_H);

  if(gs===S.MENU){ ticks++; drawMenu(); return; }
  if(gs===S.WIN) { ticks++; drawWin();  return; }
  if(gs===S.OVER){ ticks++; drawOver(); return; }

  // Play / Dead
  drawBG();
  drawPlats();
  drawOrbs();
  drawEnemies();
  drawPlayer();
  drawParticles();
  drawFloatTexts();
  drawHUD();
  if(gs===S.DEAD) drawDead();
}

function loop(){
  update();
  ticks++;
  render();
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════
//  ENTER/SPACE to transition
// ════════════════════════════════════════════
window.addEventListener('keydown', e=>{
  if(e.key===' '||e.key==='Enter'){
    if(gs===S.MENU||gs===S.WIN||gs===S.OVER) initGame();
  }
});
// Touch anywhere on canvas for menu/win/over
canvas.addEventListener('touchstart', e=>{
  if(gs===S.MENU||gs===S.WIN||gs===S.OVER) initGame();
},{passive:true});
document.getElementById('btnJ').addEventListener('touchstart', e=>{
  if(gs===S.MENU||gs===S.WIN||gs===S.OVER){ e.stopPropagation(); initGame(); }
},{passive:true});

loop();
</script>
